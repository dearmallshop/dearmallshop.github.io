baseURL = "https://dearmallshop.github.io/"
languageCode = "ko-kr"
title = "dearmallshop 쇼핑 블로그"
theme = "PaperMod"

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
summaryLength = 35

[pagination]
pagerSize = 12

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup]
	[markup.goldmark]
		[markup.goldmark.renderer]
			unsafe = true

[minify]
disableXML = false
minifyOutput = true

[sitemap]
changefreq = "daily"
priority = 0.7
filename = "sitemap.xml"

[permalinks]
posts = "/posts/:slug/"

[params]
defaultTheme = "auto"
disableThemeToggle = false
ShowShareButtons = true
ShowReadingTime = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true
TocOpen = false
env = "production"
description = "감각적인 인테리어 소품과 가구, 조명 등 다양한 홈데코 아이템을 제안하는 쇼핑 블로그입니다. 최신 트렌드와 스타일링 팁을 매일 제공합니다."
keywords = ["인테리어", "홈데코", "가구", "조명", "공간연출", "트렌드소품"]
images = ["/images/og-default.webp"]

# Search engine verification (set only when needed)
googleSiteVerification = "wYI691jLJJcCGDUHEKLHiMCiG6RGFSbe9-rfyCSjioQ"
naverSiteVerification = "93eeaa9df0d164243fb19e8aa17be0ee1c24fc42"
bingSiteVerification = ""
yandexSiteVerification = ""

[params.homeInfoParams]
Title = "트렌디한 인테리어 쇼핑, 디어몰샵"
Content = "디어몰샵에서는 거실, 침실, 주방 등 다양한 공간을 위한 인테리어 소품과 가구, 조명을 소개합니다. 감각적인 홈데코 아이템으로 나만의 공간을 스타일리시하게 꾸며보세요. 매일 새로운 트렌드와 추천 상품, 스타일링 팁을 확인할 수 있습니다."

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 2
keys = ["title", "permalink", "summary", "content"]

[[menu.main]]
identifier = "search"
name = "Search"
url = "/search/"
weight = 5

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "/posts/"
weight = 10

[[menu.main]]
identifier = "categories"
name = "Categories"
url = "/categories/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "/tags/"
weight = 30
